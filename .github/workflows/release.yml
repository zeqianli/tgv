name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release"
        required: true
        default: "nightly"
        type: choice
        options:
          - release
          - nightly
          - test
      tag_name:
        description: "Existing release tag to use when release_type is release, e.g. v0.2.0"
        required: false
        type: string
      publish_crates_io:
        description: "Publish gv-core and tgv to crates.io"
        required: true
        default: false
        type: boolean
      update_homebrew_tap:
        description: "Open a Homebrew tap PR"
        required: true
        default: false
        type: boolean

jobs:
  release-request:
    name: Validate release request
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.release_request.outputs.CHECKOUT_REF }}
      version: ${{ steps.release_request.outputs.VERSION }}
      tag_name: ${{ steps.release_request.outputs.TAG_NAME }}
      release_name: ${{ steps.release_request.outputs.RELEASE_NAME }}
      is_prerelease: ${{ steps.release_request.outputs.IS_PRERELEASE }}
      publish_crates_io: ${{ steps.release_request.outputs.PUBLISH_CRATES_IO }}
      update_homebrew_tap: ${{ steps.release_request.outputs.UPDATE_HOMEBREW_TAP }}
    steps:
      - name: Validate actor and release inputs
        id: release_request
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.actor }}" != "zeqianli" ]]; then
            echo "::error::Only zeqianli can run the release workflow."
            exit 1
          fi

          PUBLISH_CRATES_IO="false"
          UPDATE_HOMEBREW_TAP="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
            PUBLISH_CRATES_IO="${{ github.event.inputs.publish_crates_io }}"
            UPDATE_HOMEBREW_TAP="${{ github.event.inputs.update_homebrew_tap }}"

            if [[ "${RELEASE_TYPE}" == "release" ]]; then
              TAG_NAME="${{ github.event.inputs.tag_name }}"
              if [[ -z "${TAG_NAME}" ]]; then
                echo "::error::tag_name is required when release_type is release."
                exit 1
              fi
              if [[ "${TAG_NAME}" != v* ]]; then
                echo "::error::Release tags must start with v, for example v0.2.0."
                exit 1
              fi
              VERSION="${TAG_NAME#v}"
              RELEASE_NAME="${TAG_NAME}"
              CHECKOUT_REF="refs/tags/${TAG_NAME}"
              if [[ "${TAG_NAME}" == *alpha* || "${TAG_NAME}" == *beta* || "${TAG_NAME}" == *rc* ]]; then
                IS_PRERELEASE="true"
              else
                IS_PRERELEASE="false"
              fi
            else
              if [[ "${PUBLISH_CRATES_IO}" == "true" || "${UPDATE_HOMEBREW_TAP}" == "true" ]]; then
                echo "::error::Publishing to crates.io or Homebrew is only allowed for release_type=release."
                exit 1
              fi
              CURRENT_DATE=$(date +'%Y%m%d')
              VERSION="${RELEASE_TYPE}-${CURRENT_DATE}"
              TAG_NAME="${VERSION}"
              RELEASE_NAME="${RELEASE_TYPE^} Build (${CURRENT_DATE})"
              CHECKOUT_REF="${GITHUB_REF}"
              IS_PRERELEASE="true"
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#v}"
            RELEASE_NAME="${TAG_NAME}"
            CHECKOUT_REF="${GITHUB_REF}"
            if [[ "${TAG_NAME}" == *alpha* || "${TAG_NAME}" == *beta* || "${TAG_NAME}" == *rc* ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi

          echo "CHECKOUT_REF=${CHECKOUT_REF}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "TAG_NAME=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "IS_PRERELEASE=${IS_PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "PUBLISH_CRATES_IO=${PUBLISH_CRATES_IO}" >> "${GITHUB_OUTPUT}"
          echo "UPDATE_HOMEBREW_TAP=${UPDATE_HOMEBREW_TAP}" >> "${GITHUB_OUTPUT}"

  build-linux-musl:
    name: Build Linux release
    runs-on: ubuntu-latest
    needs: release-request
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-request.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl
          shared-key: x86_64-unknown-linux-musl

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools libssl-dev pkg-config libz-dev

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare binary
        run: |
          mkdir -p dist
          tar czvf dist/tgv-x86_64-linux-musl.tar.gz -C target/x86_64-unknown-linux-musl/release tgv
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tgv-linux-musl
          path: dist/tgv-x86_64-linux-musl.tar.gz

  build-macos-arm:
    name: Build macOS release
    runs-on: macos-latest
    needs: release-request
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-request.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin
          shared-key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare binary
        run: |
          mkdir -p dist
          tar czvf dist/tgv-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release tgv
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tgv-macos-arm
          path: dist/tgv-aarch64-apple-darwin.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-request
      - build-linux-musl
      - build-macos-arm
    outputs:
      version: ${{ steps.release_info.outputs.VERSION }}
      tag_name: ${{ steps.release_info.outputs.TAG_NAME }}
      release_name: ${{ steps.release_info.outputs.RELEASE_NAME }}
      is_prerelease: ${{ steps.release_info.outputs.IS_PRERELEASE }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-request.outputs.checkout_ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-files
          sha256sum *tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-files/checksums.txt

      - name: Expose release info
        id: release_info
        run: |
          echo "VERSION=${{ needs.release-request.outputs.version }}" >> "${GITHUB_OUTPUT}"
          echo "IS_PRERELEASE=${{ needs.release-request.outputs.is_prerelease }}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_NAME=${{ needs.release-request.outputs.release_name }}" >> "${GITHUB_OUTPUT}"
          echo "TAG_NAME=${{ needs.release-request.outputs.tag_name }}" >> "${GITHUB_OUTPUT}"

      - name: Create tag for nightly/test build
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'release'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag ${{ steps.release_info.outputs.TAG_NAME }}
          git push origin ${{ steps.release_info.outputs.TAG_NAME }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_info.outputs.RELEASE_NAME }}
          files: release-files/*
          draft: false
          prerelease: ${{ steps.release_info.outputs.IS_PRERELEASE }}
          tag_name: ${{ steps.release_info.outputs.TAG_NAME }}

  publish-crates-io:
    name: Publish crates.io packages
    if: github.event_name == 'workflow_dispatch' && needs.release-request.outputs.publish_crates_io == 'true' && needs.release-request.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    needs:
      - release-request
      - create-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-request.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: crates-io-publish
          shared-key: crates-io-publish

      - name: Validate crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${CARGO_REGISTRY_TOKEN}" || {
            echo "::error::Missing CARGO_REGISTRY_TOKEN secret."
            exit 1
          }

      - name: Validate package versions
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-request.outputs.version }}"
          cargo metadata --format-version 1 --no-deps > metadata.json
          GV_CORE_VERSION=$(jq -r '.packages[] | select(.name == "gv-core") | .version' metadata.json)
          TGV_VERSION=$(jq -r '.packages[] | select(.name == "tgv") | .version' metadata.json)

          test "${GV_CORE_VERSION}" = "${VERSION}" || {
            echo "::error::gv-core version ${GV_CORE_VERSION} does not match release version ${VERSION}."
            exit 1
          }
          test "${TGV_VERSION}" = "${VERSION}" || {
            echo "::error::tgv version ${TGV_VERSION} does not match release version ${VERSION}."
            exit 1
          }

      - name: Dry-run crates.io publish
        run: cargo publish --workspace --locked --dry-run

      - name: Publish workspace to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --workspace --locked

  update-homebrew-tap:
    name: Update Homebrew Tap
    if: github.event_name == 'workflow_dispatch' && needs.release-request.outputs.update_homebrew_tap == 'true' && needs.release-request.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    needs:
      - release-request
      - create-release
    permissions:
      contents: read
    steps:
      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: .

      - name: Extract checksums
        id: checksums
        run: |
          set -euo pipefail
          echo "Parsing checksums from checksums.txt"
          DARWIN_SHA=$(grep 'aarch64-apple-darwin' checksums.txt | awk '{ print $1 }')
          LINUX_SHA=$(grep 'x86_64-linux-musl' checksums.txt | awk '{ print $1 }')
          test -n "${DARWIN_SHA}"
          test -n "${LINUX_SHA}"
          echo "DARWIN_SHA=${DARWIN_SHA}" >> $GITHUB_OUTPUT
          echo "LINUX_SHA=${LINUX_SHA}" >> $GITHUB_OUTPUT
          echo "Darwin SHA: $DARWIN_SHA"
          echo "Linux SHA: $LINUX_SHA"

      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${HOMEBREW_TAP_TOKEN}" || {
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret."
            exit 1
          }

      - name: Checkout Homebrew Tap Repo
        uses: actions/checkout@v4
        with:
          repository: zeqianli/homebrew-tgv
          path: homebrew-repo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: false

      - name: Update Formula File
        working-directory: homebrew-repo
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-request.outputs.version }}"
          DARWIN_SHA="${{ steps.checksums.outputs.DARWIN_SHA }}"
          LINUX_SHA="${{ steps.checksums.outputs.LINUX_SHA }}"
          TEMPLATE_FILE="${{ github.workspace }}/.github/workflows/brew_template.tgv.rb"
          FORMULA_FILE="Formula/tgv.rb"

          test -n "${VERSION}"
          test -n "${DARWIN_SHA}"
          test -n "${LINUX_SHA}"
          test -f "${TEMPLATE_FILE}"

          echo "Updating $FORMULA_FILE using template $TEMPLATE_FILE"

          cp "$TEMPLATE_FILE" "$FORMULA_FILE"

          sed -i.bak "s|__VERSION__|${VERSION}|g" "$FORMULA_FILE"
          sed -i.bak "s|__MACOS_SHA256__|${DARWIN_SHA}|g" "$FORMULA_FILE"
          sed -i.bak "s|__LINUX_SHA256__|${LINUX_SHA}|g" "$FORMULA_FILE"

          rm -f "${FORMULA_FILE}.bak"

          ! grep -q '__VERSION__\|__MACOS_SHA256__\|__LINUX_SHA256__' "$FORMULA_FILE"

          echo "Formula file updated from template:"
          cat "$FORMULA_FILE"

      - name: Create Homebrew Tap PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-repo
          add-paths: |
            Formula/tgv.rb
          commit-message: "chore: Update tgv formula to v${{ needs.release-request.outputs.version }}"
          branch: "update-tgv-v${{ needs.release-request.outputs.version }}"
          base: main
          delete-branch: true
          title: "Update tgv formula to v${{ needs.release-request.outputs.version }}"
          body: |
            Update tgv formula to version `${{ needs.release-request.outputs.version }}`.

            **Checksums:**
            - macOS (ARM): `${{ steps.checksums.outputs.DARWIN_SHA }}`
            - Linux (musl): `${{ steps.checksums.outputs.LINUX_SHA }}`
